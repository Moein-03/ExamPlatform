<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ویرایش آزمون</title>
     <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>
<body>
     <div class="container">
          <div class="card">
               <div class="card-header">
                    <h1>ویرایش آزمون</h1>
                    <p>اطلاعات آزمون را به‌روز کنید</p>
               </div>
               <form action="{{ base_path }}/teacher/exam/{{ id }}" method="POST">
                    <input type="hidden" name="_method" value="PUT">
                    
                    <div class="form-group">
                         <label><span class="required">*</span> عنوان آزمون</label>
                         <input type="text" name="title" value="{{ title }}" required>
                    </div>
                    <div class="form-group">
                         <label>توضیحات</label>
                         <textarea name="description" rows="3">{{ description }}</textarea>
                    </div>
                    <div class="form-group">
                         <label>تاریخ و زمان شروع</label>
                         <input type="datetime-local" name="start_time" value="{{ start_time }}">
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> مدت زمان (دقیقه)</label>
                         <input type="number" name="duration" value="{{ duration }}" min="1" required>
                    </div>
                    <button type="submit">ذخیره تغییرات</button>
               </form>
               <div class="note">
                    <a href="{{ base_path }}/exams">بازگشت به لیست آزمون‌ها</a>
               </div>
          </div>
     </div>
</body>
</html>
