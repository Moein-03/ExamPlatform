<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ویرایش سوال</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          html, body { width: 100%; max-width: 100%; overflow-x: hidden; direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; }
          .mdl-card { width: 100%; max-width: 700px; margin: 0 auto; }
          .mdl-textfield { width: 100%; }
          .form-group { margin-bottom: 20px; }
          .answer-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; background: #f9f9f9; padding: 8px; border-radius: 4px; }
          .answer-row input[type="text"] { flex: 1; }
          .btn-delete-answer { color: #f44336; cursor: pointer; background: none; border: none; }
          .hidden { display: none; }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text">ویرایش سوال</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <form id="question-form" method="POST">
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                              <textarea class="mdl-textfield__input" id="question_text" name="question_text" rows="3" required></textarea>
                              <label class="mdl-textfield__label" for="question_text">متن سوال</label>
                         </div>
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                              <select class="mdl-textfield__input" id="question_type" name="question_type">
                                   <option value="single">تستی (یک گزینه)</option>
                                   <option value="multiple">تستی (چند گزینه)</option>
                                   <option value="descriptive">تشریحی</option>
                              </select>
                              <label class="mdl-textfield__label" for="question_type">نوع سوال</label>
                         </div>
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                              <input class="mdl-textfield__input" type="number" id="score" name="score" value="1" step="0.5" min="0.5">
                              <label class="mdl-textfield__label" for="score">نمره</label>
                         </div>
                         <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">ذخیره تغییرات</button>
                         <a href="{{ base_url }}/questions" class="mdl-button mdl-js-button mdl-button--raised">انصراف</a>
                         </form>

                         <hr>
                         <h4>مدیریت گزینه‌ها</h4>
                         <div id="answers-section">
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 60%;">
                              <input class="mdl-textfield__input" type="text" id="new_answer_text" placeholder="متن گزینه">
                              <label class="mdl-textfield__label" for="new_answer_text">متن گزینه جدید</label>
                         </div>
                         <label class="mdl-checkbox mdl-js-checkbox mdl-js-ripple-effect" for="new_answer_correct">
                              <input type="checkbox" id="new_answer_correct" class="mdl-checkbox__input" value="1">
                              <span class="mdl-checkbox__label">صحیح</span>
                         </label>
                         <button type="button" class="mdl-button mdl-js-button mdl-button--raised mdl-button--accent" id="add-answer-btn">افزودن گزینه</button>

                         <table class="mdl-data-table mdl-js-data-table mdl-shadow--2dp" style="width: 100%; margin-top: 20px;">
                              <thead>
                                   <tr>
                                        <th class="mdl-data-table__cell--non-numeric">متن</th>
                                        <th>وضعیت</th>
                                        <th>عملیات</th>
                                   </tr>
                              </thead>
                              <tbody id="answers-tbody"></tbody>
                         </table>
                         </div>
                    </div>
               </div>
          </div>
     </div>

     <script>
          // ===== دریافت داده از سرور =====
          var questionDataStr = '{{ question_json }}';
          var answersDataStr = '{{ answers_json }}';
          var baseUrl = '{{ base_url }}';

          var question = JSON.parse(questionDataStr);
          var answers = JSON.parse(answersDataStr) || [];

          // ===== پر کردن فرم با داده‌های سوال =====
          function fillForm() {
               document.getElementById('question_text').value = question.question_text || '';
               document.getElementById('question_type').value = question.question_type || 'single';
               document.getElementById('score').value = question.score || 1;

               // تنظیم action فرم
               var form = document.getElementById('question-form');
               form.action = baseUrl + '/question/edit/' + question.id;

               // رندر گزینه‌ها
               renderAnswers(answers);
          }

          // ===== رندر گزینه‌ها =====
          function renderAnswers(answersList) {
               var tbody = document.getElementById('answers-tbody');
               if (!tbody) return;
               var html = '';
               if (!answersList || answersList.length === 0) {
                    html = '<tr><td colspan="3" style="text-align:center;">هیچ گزینه‌ای تعریف نشده است.</td></tr>';
               } else {
                    for (var i = 0; i < answersList.length; i++) {
                         var ans = answersList[i];
                         var statusText = ans.is_correct ? 'صحیح' : 'نادرست';
                         html += '<tr id="answer-row-' + ans.id + '">';
                         html += '<td class="mdl-data-table__cell--non-numeric">' + (ans.answer_text || '') + '</td>';
                         html += '<td>' + statusText + '</td>';
                         html += '<td>';
                         html += '<form method="POST" action="' + baseUrl + '/answer/delete/' + ans.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از حذف این گزینه اطمینان دارید؟\');">';
                         html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--icon" style="color:red;"><i class="material-icons">delete</i></button>';
                         html += '</form>';
                         html += '</td>';
                         html += '</tr>';
                    }
               }
               tbody.innerHTML = html;

               if (window.componentHandler) {
                    window.componentHandler.upgradeAllRegistered();
               }
          }

          // ===== افزودن گزینه جدید (AJAX) =====
          function setupAddAnswer() {
               var btn = document.getElementById('add-answer-btn');
               if (!btn) return;
               btn.addEventListener('click', function() {
                    var text = document.getElementById('new_answer_text').value.trim();
                    var isCorrect = document.getElementById('new_answer_correct').checked ? 1 : 0;
                    if (!text) {
                         alert('لطفاً متن گزینه را وارد کنید.');
                         return;
                    }
                    if (!question || !question.id) {
                         alert('سوال یافت نشد.');
                         return;
                    }
                    fetch(baseUrl + '/answer/add/' + question.id, {
                         method: 'POST',
                         headers: { 'Content-Type': 'application/json' },
                         body: JSON.stringify({ answer_text: text, is_correct: isCorrect })
                    })
                    .then(res => res.json())
                    .then(data => {
                         if (data.success) {
                         alert('گزینه با موفقیت اضافه شد.');
                         location.reload();
                         } else {
                         alert('خطا: ' + (data.error || 'مشخص نیست'));
                         }
                    })
                    .catch(err => alert('خطا در ارتباط با سرور: ' + err));
               });
          }

          // ===== بارگذاری صفحه =====
          window.onload = function() {
               fillForm();
               setupAddAnswer();
               if (window.componentHandler) {
                    window.componentHandler.upgradeAllRegistered();
               }
          };
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
