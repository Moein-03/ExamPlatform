<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>مدیریت کاربران</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          html, body { width: 100%; max-width: 100%; overflow-x: hidden; direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; }
          .mdl-card { width: 100%; max-width: 100%; margin: 0; }
          .mdl-card__supporting-text { padding: 16px; width: 100%; max-width: 100%; box-sizing: border-box; }
          .table-container { overflow-x: auto; }
          table { width: 100%; table-layout: fixed; border-collapse: collapse; }
          th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
          th { background: #f5f5f5; font-weight: bold; }
          th:nth-child(1), td:nth-child(1) { width: 25%; }
          th:nth-child(2), td:nth-child(2) { width: 25%; }
          th:nth-child(3), td:nth-child(3) { width: 20%; }
          th:nth-child(4), td:nth-child(4) { width: 30%; }
          .btn-icon { color: #3f51b5; }
          @media (max-width: 600px) {
               body { padding: 10px; }
               td, th { font-size: 0.85em; padding: 6px 4px; }
          }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text">مدیریت کاربران</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <div class="table-container">
                         <table>
                              <thead>
                                   <tr>
                                        <th class="mdl-data-table__cell--non-numeric">نام</th>
                                        <th class="mdl-data-table__cell--non-numeric">ایمیل</th>
                                        <th>نقش</th>
                                        <th>عملیات</th>
                                   </tr>
                              </thead>
                              <tbody id="users-tbody">
                                   <tr><td colspan="4" style="text-align:center;">در حال بارگذاری...</td></tr>
                              </tbody>
                         </table>
                         </div>
                    </div>
               </div>
          </div>
     </div>

     <script>
          var usersDataStr = '{{ users_json }}';
          var baseUrl = '{{ base_url }}';
          var users = JSON.parse(usersDataStr);

          function renderUsers(users) {
               var tbody = document.getElementById('users-tbody');
               if (!tbody) return;

               if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999;">هیچ کاربری یافت نشد</td></tr>';
                    return;
               }

               var html = '';
               for (var i = 0; i < users.length; i++) {
                    var u = users[i];
                    var roleLabel = u.role === 'admin' ? 'مدیر' : (u.role === 'teacher' ? 'استاد' : 'دانشجو');

                    html += '<tr>';
                    html += '<td class="mdl-data-table__cell--non-numeric">' + (u.fullname || '') + '</td>';
                    html += '<td class="mdl-data-table__cell--non-numeric">' + (u.email || '') + '</td>';
                    html += '<td>' + roleLabel + '</td>';
                    html += '<td>';
                    html += '<a href="' + baseUrl + '/user/' + u.id + '" class="mdl-button mdl-js-button mdl-button--icon btn-icon" title="ویرایش"><i class="material-icons">edit</i></a>';
                    html += '</td>';
                    html += '</tr>';
               }
               tbody.innerHTML = html;
          }

          window.onload = function() {
               renderUsers(users);
               if (window.componentHandler) {
                    window.componentHandler.upgradeAllRegistered();
               }
          };
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
