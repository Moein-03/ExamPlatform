<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>بارگذاری سوالات</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          body { direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; padding: 20px; }
          .mdl-card { width: 100%; max-width: 700px; margin: 0 auto; }
          textarea { font-family: monospace; }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text">بارگذاری سوالات از JSON</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <form method="POST" action="{{ base_url }}/question/import">
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width:100%;">
                              <textarea class="mdl-textfield__input" id="questions_json" name="questions_json" rows="10" required placeholder="[ { &quot;question_text&quot;: &quot;...&quot;, &quot;question_type&quot;: &quot;single&quot;, &quot;score&quot;: 1, &quot;answers&quot;: [ { &quot;answer_text&quot;: &quot;...&quot;, &quot;is_correct&quot;: 1 } ] } ]"></textarea>
                              <label class="mdl-textfield__label" for="questions_json">داده‌های JSON (آرایه‌ای از سوالات)</label>
                         </div>
                         <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">بارگذاری</button>
                         <a href="{{ base_url }}/questions" class="mdl-button mdl-js-button mdl-button--raised">بازگشت</a>
                         </form>
                    </div>
               </div>
          </div>
     </div>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
