<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوال جدید</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <style>
        * { box-sizing: border-box; }
        body { 
            direction: rtl; 
            background: #f5f5f5; 
        }
        .mdl-card {
            max-width: 780px;
            margin: 20px auto;
            width: 96%;
        }
        .mdl-card__title {
            background: #3f51b5;
            color: white;
        }
        .mdl-card__supporting-text {
            padding: 32px 40px;
        }
        .answer-row {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        @media (max-width: 600px) {
            .mdl-card__supporting-text { padding: 20px; }
            .answer-row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="mdl-grid">
        <div class="mdl-cell mdl-cell--12-col">
            <div class="mdl-card mdl-shadow--3dp">
                <div class="mdl-card__title">
                    <h2 class="mdl-card__title-text">افزودن سوال جدید</h2>
                </div>
                <div class="mdl-card__supporting-text">
                    
                    <div id="error-container" class="error-message {{ 'hidden' if not error else '' }}">
                        {{ error }}
                    </div>

                    <form id="question-form" method="POST" action="{{ base_url }}/question/add">
                        
                        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                            <textarea class="mdl-textfield__input" id="question_text" name="question_text" rows="4" required></textarea>
                            <label class="mdl-textfield__label">متن سوال</label>
                        </div>

                        <div class="mdl-grid">
                            <div class="mdl-cell mdl-cell--8-col">
                                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                                    <select id="question_type" name="question_type" class="mdl-textfield__input" onchange="handleQuestionTypeChange()">
                                        <option value="true_false">صحیح / غلط</option>
                                        <option value="single">چند گزینه‌ای (یک پاسخ)</option>
                                        <option value="descriptive">تشریحی</option>
                                    </select>
                                    <label class="mdl-textfield__label">نوع سوال</label>
                                </div>
                            </div>
                            <div class="mdl-cell mdl-cell--4-col">
                                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                                    <input class="mdl-textfield__input" type="number" id="score" name="score" value="1" step="0.5" min="0.5">
                                    <label class="mdl-textfield__label">نمره</label>
                                </div>
                            </div>
                        </div>

                        <div id="answers-section">
                            <div class="flex justify-between items-center mb-4">
                                <h4 id="answers-title" class="mdl-typography--title">گزینه‌ها</h4>
                                <button type="button" id="add-btn" onclick="addOption()" 
                                        class="mdl-button mdl-js-button mdl-button--raised mdl-button--accent" style="display:none;">
                                    <i class="material-icons">add</i> گزینه جدید
                                </button>
                            </div>
                            <div id="answers-container"></div>
                        </div>

                        <div style="margin-top: 40px;">
                            <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">
                                ذخیره سوال
                            </button>
                            <a href="{{ base_url }}/questions" class="mdl-button mdl-js-button mdl-button--raised" style="margin-right: 16px;">
                                انصراف
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tempAnswers = [];

        function handleQuestionTypeChange() {
            const type = document.getElementById('question_type').value;
            const section = document.getElementById('answers-section');
            const addBtn = document.getElementById('add-btn');
            
            if (type === 'descriptive') {
                section.style.display = 'none';
                return;
            }
            
            section.style.display = 'block';
            addBtn.style.display = type === 'single' ? 'inline-flex' : 'none';

            if (type === 'true_false') {
                document.getElementById('answers-title').textContent = 'گزینه‌های صحیح/غلط';
                tempAnswers = [
                    {text: 'صحیح', is_correct: 1},
                    {text: 'غلط', is_correct: 0}
                ];
            } else if (type === 'single') {
                document.getElementById('answers-title').textContent = 'گزینه‌ها';
                if (tempAnswers.length < 2) {
                    tempAnswers = [];
                }
            }
            renderAnswers();
        }

        function renderAnswers() {
            let html = '';
            tempAnswers.forEach((ans, i) => {
                html += `
                    <div class="answer-row">
                        <div style="flex:1">
                            <input type="text" class="mdl-textfield__input" value="${ans.text}" 
                                   oninput="tempAnswers[${i}].text = this.value" style="width:100%">
                        </div>
                        <label class="mdl-radio mdl-js-radio mdl-js-ripple-effect">
                            <input type="radio" name="correct" ${ans.is_correct ? 'checked' : ''} 
                                   onchange="setCorrect(${i})">
                            <span class="mdl-radio__label">صحیح</span>
                        </label>
                        ${tempAnswers.length > 2 ? 
                            `<button onclick="removeAnswer(${i})" class="mdl-button mdl-js-button mdl-button--icon" style="color:#f44336;">
                                <i class="material-icons">delete</i>
                             </button>` : ''}
                    </div>`;
            });
            document.getElementById('answers-container').innerHTML = html || '<p class="text-gray-500">گزینه‌ای وجود ندارد.</p>';
        }

        function setCorrect(index) {
            tempAnswers.forEach((a, i) => a.is_correct = (i === index) ? 1 : 0);
        }

        function addOption() {
            const text = prompt("متن گزینه جدید را وارد کنید:");
            if (text && text.trim()) {
                tempAnswers.push({ text: text.trim(), is_correct: 0 });
                renderAnswers();
            }
        }

        function removeAnswer(i) {
            if (tempAnswers.length > 2) {
                tempAnswers.splice(i, 1);
                renderAnswers();
            } else {
                alert("حداقل دو گزینه لازم است.");
            }
        }

        document.getElementById('question-form').addEventListener('submit', function(e) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'answers';
            input.value = JSON.stringify(tempAnswers);
            this.appendChild(input);
        });

        window.onload = () => {
            handleQuestionTypeChange();
            if (window.componentHandler) window.componentHandler.upgradeAllRegistered();
        };
    </script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
