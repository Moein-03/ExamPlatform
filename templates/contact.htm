<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>تماس با ما</title>
     <link rel="stylesheet" href="./style.css">
</head>
<body>
     <div class="container">
          <div class="card">
               <div class="card-header">
                    <h1>تماس با ما</h1>
                    <p>کاربران مهمان می‌توانند پیام خود را ارسال کنند</p>
               </div>
               <form action="http://127.0.0.1:8000/" method="POST">
                    <div class="form-group">
                         <label><span class="required">*</span> نام و نام خانوادگی</label>
                         <input type="text" name="fullname" placeholder="مثال: معین خسروی" required>
                    </div>
                    <div class="form-row">
                         <div class="form-group">
                         <label><span class="required">*</span> ایمیل</label>
                         <input type="email" name="email" placeholder="info@example.com" required>
                         </div>
                         <div class="form-group">
                         <label>شماره تماس (اختیاری)</label>
                         <input type="tel" name="phone" placeholder="۰۹۹۰۰۰۰۰۰۰۰">
                         </div>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> موضوع پیام</label>
                         <select name="subject" required>
                         <option value="" disabled selected>— انتخاب کنید —</option>
                         <option value="مشکل فنی">مشکل فنی در آزمون</option>
                         <option value="پیشنهاد">پیشنهاد و انتقاد</option>
                         <option value="همکاری">درخواست همکاری</option>
                         </select>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> متن پیام</label>
                         <textarea name="message" rows="5" placeholder="پیام خود را بنویسید..." required></textarea>
                    </div>
                    <button type="submit">ارسال پیام</button>
               </form>
               <div class="note">کاربران بدون لاگین هم می‌توانند از این فرم استفاده کنند.</div>
          </div>
     </div>
</body>
</html>
