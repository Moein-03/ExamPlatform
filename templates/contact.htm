<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>تماس با ما</title>
     <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>
<body>
     <div class="container">
          <div class="card">
               <div class="card-header">
                    <h1>ارسال پیام</h1>
                    <p>سوالات، پیشنهادات یا گزارش مشکلات</p>
               </div>
               <form action="{{ base_path }}/contact" method="POST">
                    <div class="form-group">
                         <label><span class="required">*</span> نام و نام خانوادگی</label>
                         <input type="text" name="user_name" placeholder="نام کامل" required>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> ایمیل</label>
                         <input type="email" name="user_email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                         <label>موضوع</label>
                         <input type="text" name="subject" placeholder="موضوع پیام">
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> متن پیام</label>
                         <textarea name="user_message" rows="5" placeholder="متن پیام..." required></textarea>
                    </div>
                    <button type="submit">ارسال پیام</button>
               </form>
               <div class="note">
                    <a href="{{ base_path }}/">بازگشت به صفحه اصلی</a>
               </div>
          </div>
     </div>
</body>
</html>
