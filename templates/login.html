<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ورود به سامانه</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     
     <style>
          body {
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
               min-height: 100vh;
               margin: 0;
               font-family: Tahoma, sans-serif;
          }
          .main-container {
               display: flex;
               align-items: center;
               justify-content: center;
               min-height: 100vh;
               padding: 20px;
          }
          .mdl-card {
               width: 100%;
               max-width: 420px;
               border-radius: 12px;
               overflow: hidden;
               box-shadow: 0 10px 30px rgba(0,0,0,0.2);
          }
          .card-header {
               background: #3f51b5;
               color: white;
               padding: 32px 24px;
               text-align: center;
          }
          .card-header h2 {
               margin: 12px 0 0 0;
               font-size: 1.75rem;
          }
          .form-content {
               padding: 32px 32px 40px;
          }
          .error-message {
               background: #ffebee;
               color: #c62828;
               padding: 12px 16px;
               border-radius: 6px;
               margin-bottom: 20px;
               display: none;
          }
          .mdl-button {
               width: 100%;
               height: 52px;
               font-size: 1.05rem;
          }
     </style>
</head>
<body>
     <div class="main-container">
          <div class="mdl-card mdl-shadow--6dp">
               
               <!-- Header -->
               <div class="card-header">
                    <i class="material-icons" style="font-size: 42px;">login</i>
                    <h2>ورود به سامانه</h2>
               </div>

               <!-- Form -->
               <div class="form-content">
                    <div id="error-container" class="error-message"></div>
                    
                    <form id="login-form" method="POST" action="{{ base_url }}/login">
                         
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                         <input class="mdl-textfield__input" type="text" id="username" name="username" required>
                         <label class="mdl-textfield__label" for="username">نام کاربری یا ایمیل</label>
                         </div>

                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                         <input class="mdl-textfield__input" type="password" id="password" name="password" required autocomplete="current-password">
                         <label class="mdl-textfield__label" for="password">رمز عبور</label>
                         </div>

                         <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">
                         ورود
                         </button>
                    </form>

                    <p style="text-align: center; margin-top: 24px;">
                         <a href="#" data-link="{{ base_url }}/register" style="color: #3f51b5; text-decoration: none;">
                         حساب کاربری ندارید؟ ثبت نام
                         </a>
                    </p>
               </div>
          </div>
     </div>

     <script>
          (function() {
               var base_url = window.__DATA__ ? window.__DATA__.base_url : '';
               var error = '{{ error }}' || '';

               // تنظیم لینک‌ها
               document.querySelectorAll('[data-link]').forEach(link => {
                    var path = link.getAttribute('data-link');
                    if (path) link.href = base_url + path;
               });

               // نمایش خطا
               if (error) {
                    const errContainer = document.getElementById('error-container');
                    errContainer.textContent = error;
                    errContainer.style.display = 'block';
               }

               // اعتبارسنجی ساده
               const form = document.getElementById('login-form');
               form.addEventListener('submit', function(e) {
                    const username = document.getElementById('username').value.trim();
                    const password = document.getElementById('password').value.trim();
                    
                    if (!username || !password) {
                         e.preventDefault();
                         const errContainer = document.getElementById('error-container');
                         errContainer.textContent = 'لطفاً نام کاربری و رمز عبور را وارد کنید.';
                         errContainer.style.display = 'block';
                    }
               });
          })();
     </script>

     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
