<div id="login-page" style="max-width:400px; margin:0 auto; padding:20px;">
     <h3>ورود به سامانه</h3>
     <div id="error-container" class="hidden" style="background:#f8d7da; color:#721c24; padding:10px; border-radius:4px; margin-bottom:10px;"></div>
     
     <form id="login-form" method="POST" action="{{ base_url }}/login">
          <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width:100%;">
               <input class="mdl-textfield__input" type="text" id="username" name="username" required>
               <label class="mdl-textfield__label" for="username">نام کاربری</label>
          </div>
          <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width:100%;">
               <input class="mdl-textfield__input" type="password" id="password" name="password" required autocomplete="current-password">
               <label class="mdl-textfield__label" for="password">رمز عبور</label>
          </div>
          <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored" style="width:100%;">ورود</button>
     </form>
     
     <p style="text-align:center;">
          <a href="#" data-link="{{ base_url }}/register">ثبت نام</a>
     </p>
</div>

<script>
     (function() {
          var base_url = window.__DATA__ && window.__DATA__.base_url ? window.__DATA__.base_url : '';
          var error = '{{ error }}' || null;

          // تنظیم لینک‌های data-link
          var links = document.querySelectorAll('[data-link]');
          for (var i = 0; i < links.length; i++) {
               var link = links[i];
               var path = link.getAttribute('data-link');
               if (path) {
                    link.href = base_url + path;
               }
          }

          if (error) {
               var errContainer = document.getElementById('error-container');
               if (errContainer) {
                    errContainer.textContent = error;
                    errContainer.classList.remove('hidden');
               }
          }

          // اعتبارسنجی سمت کلاینت: جلوگیری از ارسال فرم خالی
          var form = document.getElementById('login-form');
          if (form) {
               form.addEventListener('submit', function(e) {
                    var username = document.getElementById('username').value.trim();
                    var password = document.getElementById('password').value.trim();
                    if (!username || !password) {
                         e.preventDefault();
                         var errContainer = document.getElementById('error-container');
                         if (errContainer) {
                         errContainer.textContent = 'لطفاً نام کاربری و رمز عبور را وارد کنید.';
                         errContainer.classList.remove('hidden');
                         }
                    }
               });
          }
     })();
</script>
