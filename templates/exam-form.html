<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>فرم آزمون</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { 
               direction: rtl; 
               text-align: right; 
               font-family: 'Roboto', Tahoma, sans-serif; 
               background: linear-gradient(135deg, #f0f4f8 0%, #e8f0f7 100%);  
               min-height: 100vh;
          }
          
          .mdl-card { 
               max-width: 760px; 
               margin: 0 auto; 
               width: 100%; 
               border-radius: 16px;
               overflow: hidden;
               box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
          }
          
          .mdl-card__title {
               background: linear-gradient(90deg, #3f51b5, #5c6bc0);
               color: white;
               padding: 24px 28px;
          }
          
          .mdl-card__title-text {
               font-size: 1.55rem;
               font-weight: 500;
          }
          
          .mdl-card__supporting-text {
               padding: 28px 32px 32px;
               background: #fff;
          }
          
          .mdl-textfield {
               width: 100%;
               margin-bottom: 24px;
          }
          
          .mdl-textfield__input {
               border-bottom: 2px solid #3f51b5;
          }
          
          .mdl-textfield__label {
               color: #666;
               font-size: 1.02rem;
          }
          
          h4 {
               margin: 28px 0 14px;
               color: #333;
               font-size: 1.2rem;
               font-weight: 500;
               padding-bottom: 8px;
               border-bottom: 2px solid #e0e0e0;
          }
          
          .search-box {
               width: 100%;
               margin-bottom: 14px;
          }
          
          #questions-checkboxes, #students-checkboxes {
               margin-top: 10px;
               padding: 14px 18px;
               background: #f8f9fa;
               border-radius: 12px;
               border: 1px solid #e0e0e0;
               max-height: 280px; /* کاهش ارتفاع */
               overflow-y: auto;
          }
          
          #questions-checkboxes p, #students-checkboxes p {
               margin: 9px 0;
               padding: 8px 12px;
               border-radius: 8px;
               transition: all 0.2s ease;
          }
          
          #questions-checkboxes p:hover, #students-checkboxes p:hover {
               background: #e8eaf6;
          }
          
          label {
               display: flex;
               align-items: flex-start;
               cursor: pointer;
               font-size: 1rem;
               line-height: 1.5;
          }
          
          input[type="checkbox"] {
               margin-left: 12px;
               margin-top: 3px;
               accent-color: #3f51b5;
          }
          
          .form-actions { 
               margin-top: 32px; 
               display: flex; 
               gap: 12px; 
               flex-wrap: wrap;
          }
          
          .hidden { display: none; }
          
          input[type="datetime-local"], 
          input[type="number"] {
               font-size: 1.02rem;
          }
          
          textarea {
               resize: vertical;
               min-height: 100px;
          }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text" id="form-title">ساخت آزمون جدید</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <form id="exam-form" method="POST">
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                              <input class="mdl-textfield__input" type="text" id="title" name="title" required>
                              <label class="mdl-textfield__label" for="title">عنوان آزمون</label>
                         </div>
                         
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                              <textarea class="mdl-textfield__input" id="description" name="description" rows="4"></textarea>
                              <label class="mdl-textfield__label" for="description">توضیحات</label>
                         </div>
                         
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                              <input class="mdl-textfield__input" type="datetime-local" id="start_time" name="start_time" required>
                              <label class="mdl-textfield__label" for="start_time">زمان شروع</label>
                         </div>
                         
                         <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                              <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                                   <input class="mdl-textfield__input" type="number" id="duration" name="duration" value="30" required>
                                   <label class="mdl-textfield__label" for="duration">مدت زمان (دقیقه)</label>
                              </div>
                              
                              <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                                   <input class="mdl-textfield__input" type="number" id="total_score" name="total_score" step="0.5" value="10" required>
                                   <label class="mdl-textfield__label" for="total_score">نمره کل</label>
                              </div>
                         </div>

                         <p style="margin: 22px 0 10px;">
                              <label style="font-size: 1.05rem;">
                                   <input type="checkbox" name="is_random" value="true" id="is_random" onchange="toggleRandom()">
                                   انتخاب تصادفی سوالات
                              </label>
                         </p>
                         
                         <div id="random-questions-count" style="display:none; margin-bottom: 20px;">
                              <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                                   <input class="mdl-textfield__input" type="number" id="total_questions" name="total_questions" value="5">
                                   <label class="mdl-textfield__label" for="total_questions">تعداد سوالات (تصادفی)</label>
                              </div>
                         </div>

                         <h4>انتخاب سوالات (در صورت عدم انتخاب تصادفی)</h4>
                         <div class="search-box">
                              <input type="text" id="search-questions" class="mdl-textfield__input" placeholder="جستجوی سوال..." style="width:100%; padding:11px; border-radius:8px; border:1px solid #ddd;">
                         </div>
                         <div id="questions-checkboxes"></div>

                         <h4>انتخاب دانشجویان</h4>
                         <div class="search-box">
                              <input type="text" id="search-students" class="mdl-textfield__input" placeholder="جستجوی دانشجو..." style="width:100%; padding:11px; border-radius:8px; border:1px solid #ddd;">
                         </div>
                         <div id="students-checkboxes"></div>

                         <div class="form-actions">
                              <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">ذخیره</button>
                              <a href="{{ base_url }}/exams" class="mdl-button mdl-js-button mdl-button--raised">بازگشت</a>
                         </div>
                         </form>
                    </div>
               </div>
          </div>
     </div>

     <div id="exam-form-data" 
          data-exam='{{ exam_json }}' 
          data-questions='{{ questions_json }}' 
          data-students='{{ students_json }}'
          data-base-url='{{ base_url }}'>
     </div>

     <script>
          (function() {
               var dataElement = document.getElementById('exam-form-data');
               var exam = JSON.parse(dataElement.getAttribute('data-exam') || 'null');
               var questions = JSON.parse(dataElement.getAttribute('data-questions') || '[]');
               var students = JSON.parse(dataElement.getAttribute('data-students') || '[]');
               var baseUrl = dataElement.getAttribute('data-base-url') || '';

               if (exam) {
                    document.getElementById('form-title').textContent = 'ویرایش آزمون: ' + (exam.title || '');
                    document.getElementById('title').value = exam.title || '';
                    document.getElementById('description').value = exam.description || '';
                    document.getElementById('start_time').value = exam.start_time || '';
                    document.getElementById('duration').value = exam.duration || 30;
                    document.getElementById('total_score').value = exam.total_score || 10;
                    if (exam.is_random) {
                         document.getElementById('is_random').checked = true;
                         document.getElementById('total_questions').value = exam.total_questions || 5;
                         toggleRandom();
                    }
               }

               var form = document.getElementById('exam-form');
               if (exam) {
                    form.action = baseUrl + '/exam/edit/' + exam.id;
               } else {
                    form.action = baseUrl + '/exam/add';
               }

               var qContainer = document.getElementById('questions-checkboxes');
               var qSearch = document.getElementById('search-questions');
               if (qContainer) {
                    if (questions && questions.length > 0) {
                         var selectedIds = {};
                         if (exam && exam.question_ids) {
                              for (var k = 0; k < exam.question_ids.length; k++) {
                                   selectedIds[exam.question_ids[k]] = true;
                              }
                         }
                         var html = '';
                         for (var i = 0; i < questions.length; i++) {
                              var q = questions[i];
                              var checked = selectedIds[q.id] ? 'checked' : '';
                              html += `<p data-text="${(q.question_text || '').toLowerCase()}"><label><input type="checkbox" name="question_ids" value="${q.id}" ${checked}> ${(q.question_text || '')} (نمره: ${q.score})</label></p>`;
                         }
                         qContainer.innerHTML = html;
                    } else {
                         qContainer.innerHTML = '<p>هیچ سوالی در بانک سوالات شما وجود ندارد. ابتدا سوال ایجاد کنید.</p>';
                    }
               }

               var sContainer = document.getElementById('students-checkboxes');
               var sSearch = document.getElementById('search-students');
               if (sContainer) {
                    if (students && students.length > 0) {
                         var selectedStudents = {};
                         if (exam && exam.student_ids) {
                              for (var m = 0; m < exam.student_ids.length; m++) {
                                   selectedStudents[exam.student_ids[m]] = true;
                              }
                         }
                         var html2 = '';
                         for (var j = 0; j < students.length; j++) {
                              var s = students[j];
                              var checked2 = selectedStudents[s.id] ? 'checked' : '';
                              html2 += `<p data-text="${(s.fullname || '').toLowerCase() + ' ' + (s.email || '').toLowerCase()}"><label><input type="checkbox" name="student_ids" value="${s.id}" ${checked2}> ${(s.fullname || '')} (${s.email})</label></p>`;
                         }
                         sContainer.innerHTML = html2;
                    } else {
                         sContainer.innerHTML = '<p>هیچ دانشجویی ثبت‌نام نکرده است.</p>';
                    }
               }

               if (qSearch) {
                    qSearch.addEventListener('input', function() {
                         var term = this.value.toLowerCase().trim();
                         var items = qContainer.querySelectorAll('p[data-text]');
                         items.forEach(function(item) {
                              if (item.getAttribute('data-text').includes(term)) {
                                   item.style.display = '';
                              } else {
                                   item.style.display = 'none';
                              }
                         });
                    });
               }

               if (sSearch) {
                    sSearch.addEventListener('input', function() {
                         var term = this.value.toLowerCase().trim();
                         var items = sContainer.querySelectorAll('p[data-text]');
                         items.forEach(function(item) {
                              if (item.getAttribute('data-text').includes(term)) {
                                   item.style.display = '';
                              } else {
                                   item.style.display = 'none';
                              }
                         });
                    });
               }

               window.toggleRandom = function() {
                    var isRandom = document.getElementById('is_random').checked;
                    var randomDiv = document.getElementById('random-questions-count');
                    var questionCheckboxes = document.getElementById('questions-checkboxes');
                    if (isRandom) {
                         randomDiv.style.display = 'block';
                         questionCheckboxes.style.display = 'none';
                         var inputs = questionCheckboxes.querySelectorAll('input[type="checkbox"]');
                         for (var i = 0; i < inputs.length; i++) {
                              inputs[i].disabled = true;
                         }
                    } else {
                         randomDiv.style.display = 'none';
                         questionCheckboxes.style.display = 'block';
                         var inputs = questionCheckboxes.querySelectorAll('input[type="checkbox"]');
                         for (var i = 0; i < inputs.length; i++) {
                              inputs[i].disabled = false;
                         }
                    }
               };
               toggleRandom();

               if (window.componentHandler) {
                    window.componentHandler.upgradeAllRegistered();
               }
          })();
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
