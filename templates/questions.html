<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>بانک سوالات</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          body { direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; }
          .mdl-card { width: 100%; }
          .table-container { overflow-x: auto; }
          table { width: 100%; border-collapse: collapse; }
          th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e0e0e0; }
          th { background: #f5f5f5; font-weight: bold; }
          .btn-icon { color: #3f51b5; }
          .btn-delete { color: #f44336; }
          .header-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
          .question-type-badge { background: #e0e0e0; padding: 2px 10px; border-radius: 12px; font-size: 0.85em; }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text">بانک سوالات</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <div class="header-actions" id="header-actions"></div>
                         <div class="table-container">
                         <table>
                              <thead>
                                   <tr>
                                        <th class="mdl-data-table__cell--non-numeric">متن سوال</th>
                                        <th>نوع</th>
                                        <th>نمره</th>
                                        <th>عملیات</th>
                                   </tr>
                              </thead>
                              <tbody id="questions-tbody">
                                   <tr><td colspan="4" style="text-align:center;">در حال بارگذاری...</td></tr>
                              </tbody>
                         </table>
                         </div>
                    </div>
               </div>
          </div>
     </div>

     <script>
          // ===== دریافت داده از سرور =====
          var questionsDataStr = '{{ questions_json }}';
          var baseUrl = '{{ base_url }}';
          var userRole = '{{ user_role }}';
          var questions = JSON.parse(questionsDataStr);

          // ===== رندر هدر (دکمه‌های اقدام) =====
          function renderHeader() {
               var container = document.getElementById('header-actions');
               if (!container) return;
               var html = '';
               html += '<a href="' + baseUrl + '/question/add" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">سوال جدید</a>';
               html += '<a href="' + baseUrl + '/question/import" class="mdl-button mdl-js-button mdl-button--raised mdl-button--accent">وارد کردن سوالات</a>';
               html += '<a href="' + baseUrl + '/question/export" class="mdl-button mdl-js-button mdl-button--raised">خروجی سوالات</a>';
               container.innerHTML = html;
          }

          // ===== رندر جدول =====
          function renderTable(questions) {
               var tbody = document.getElementById('questions-tbody');
               if (!tbody) return;

               if (questions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999;">هیچ سوالی یافت نشد</td></tr>';
                    return;
               }

               var html = '';
               for (var i = 0; i < questions.length; i++) {
                    var q = questions[i];
                    var typeText = '';
                    if (q.question_type === 'single') typeText = 'تستی (یک گزینه)';
                    else if (q.question_type === 'multiple') typeText = 'تستی (چند گزینه)';
                    else typeText = 'تشریحی';

                    html += '<tr>';
                    html += '<td class="mdl-data-table__cell--non-numeric">' + (q.question_text || '') + '</td>';
                    html += '<td><span class="question-type-badge">' + typeText + '</span></td>';
                    html += '<td>' + (q.score || 0) + '</td>';
                    html += '<td>';
                    html += '<a href="' + baseUrl + '/question/edit/' + q.id + '" class="mdl-button mdl-js-button mdl-button--icon btn-icon" title="ویرایش"><i class="material-icons">edit</i></a>';
                    html += '<form method="POST" action="' + baseUrl + '/question/delete/' + q.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از حذف این سوال اطمینان دارید؟\');">';
                    html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--icon btn-delete" title="حذف"><i class="material-icons">delete</i></button>';
                    html += '</form>';
                    html += '</td>';
                    html += '</tr>';
               }
               tbody.innerHTML = html;
          }

          // ===== بارگذاری =====
          window.onload = function() {
               renderHeader();
               renderTable(questions);
               if (window.componentHandler) {
                    window.componentHandler.upgradeAllRegistered();
               }
          };
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
