<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ایجاد آزمون جدید</title>
     <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>
<body>
     <div class="container">
          <div class="card">
               <div class="card-header">
                    <h1>ایجاد آزمون جدید</h1>
                    <p>استاد گرامی، مشخصات آزمون را وارد کنید</p>
               </div>
               <form action="{{ base_path }}/teacher/exam" method="POST">
                    <div class="form-group">
                         <label><span class="required">*</span> عنوان آزمون</label>
                         <input type="text" name="title" placeholder="مثال: ریاضی پایه - فصل دوم" required>
                    </div>
                    <div class="form-group">
                         <label>توضیحات (هدف، سطح دشواری و ...)</label>
                         <textarea name="description" rows="3" placeholder="توضیحات تکمیلی..."></textarea>
                    </div>
                    <div class="form-row">
                         <div class="form-group">
                              <label>تاریخ و زمان شروع</label>
                              <input type="datetime-local" name="start_time">
                         </div>
                    </div>
                    <div class="form-row">
                         <div class="form-group">
                              <label><span class="required">*</span> مدت زمان (دقیقه)</label>
                              <input type="number" name="duration" min="1" placeholder="مثلاً 90" required>
                         </div>
                    </div>
                    <button type="submit">ذخیره آزمون در دیتابیس</button>
               </form>
               <div class="note">تنها کاربران با نقش «استاد» به این فرم دسترسی دارند.</div>
          </div>
     </div>
</body>
</html>
