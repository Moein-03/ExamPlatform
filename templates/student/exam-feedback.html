<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>نتایج آزمون</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          body { direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; }
          .score-number { font-size: 2.5em; color: #3f51b5; font-weight: bold; }
          .status-passed { color: #4caf50; font-size: 1.5em; font-weight: bold; }
          .status-failed { color: #f44336; font-size: 1.5em; font-weight: bold; }
          .question-feedback { margin-bottom: 20px; padding: 15px; border-radius: 8px; background: white; border: 1px solid #e0e0e0; }
          .correct { color: #4caf50; font-weight: bold; }
          .incorrect { color: #f44336; font-weight: bold; }
          .stat-box { padding: 20px; text-align: center; background: #f9f9f9; border-radius: 8px; height: 100%; }
          .highlight-correct { background: #e8f5e9; border-color: #4caf50; }
          .highlight-incorrect { background: #ffebee; border-color: #f44336; }
          .mdl-card { width: 100%; }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text">نتایج آزمون</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <div class="mdl-grid" id="stats-container"></div>
                         <hr>
                         <h4>بازخورد دقیق سوالات</h4>
                         <div id="feedback-details-container"></div>
                    </div>
               </div>
          </div>
     </div>

     <script>
          // ===== دریافت داده‌ها =====
          var feedbackDataStr = '{{ feedback_json }}';
          var statsDataStr = '{{ stats_json }}';

          var feedbackData = JSON.parse(feedbackDataStr);
          var statsData = JSON.parse(statsDataStr);
          var passed = feedbackData.passed || false;

          // ===== رندر آمار =====
          function renderStats(stats) {
               var container = document.getElementById('stats-container');
               if (!container) return;
               var html = '';

               html += '<div class="mdl-cell mdl-cell--4-col">';
               html += '<div class="stat-box">';
               html += '<h3>نمره شما</h3>';
               html += '<p class="score-number">' + (feedbackData.score || 0) + '</p>';
               html += '</div></div>';

               html += '<div class="mdl-cell mdl-cell--4-col">';
               html += '<div class="stat-box">';
               html += '<h3>وضعیت</h3>';
               var statusClass = passed ? 'status-passed' : 'status-failed';
               var statusText = passed ? 'قبول' : 'مردود';
               html += '<p class="' + statusClass + '">' + statusText + '</p>';
               html += '</div></div>';

               html += '<div class="mdl-cell mdl-cell--4-col">';
               html += '<div class="stat-box">';
               html += '<h3>آمار کلی</h3>';
               html += '<p>میانگین: ' + (stats.avg_score || 0) + '</p>';
               html += '<p>بالاترین: ' + (stats.max_score || 0) + '</p>';
               html += '<p>پایین‌ترین: ' + (stats.min_score || 0) + '</p>';
               html += '</div></div>';

               container.innerHTML = html;
          }

          // ===== رندر بازخورد سوالات =====
          function renderFeedback(details) {
               var container = document.getElementById('feedback-details-container');
               if (!container) return;

               if (!details || details.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#999;">هیچ بازخوردی موجود نیست.</p>';
                    return;
               }

               var html = '';
               for (var i = 0; i < details.length; i++) {
                    var item = details[i];
                    var qNum = i + 1;
                    var isCorrect = item.is_correct || false;
                    var statusClass = isCorrect ? 'correct' : 'incorrect';
                    var statusText = isCorrect ? 'صحیح' : 'غلط';
                    var highlightClass = isCorrect ? 'highlight-correct' : 'highlight-incorrect';

                    html += '<div class="question-feedback ' + highlightClass + '">';
                    html += '<p><strong>سوال ' + qNum + ':</strong> ' + (item.question_text || '') + '</p>';
                    html += '<p><strong>پاسخ شما:</strong> ' + (item.user_answer || 'پاسخی داده نشده') + '</p>';
                    html += '<p><strong>پاسخ صحیح:</strong> ' + (item.correct_answer || 'نامشخص') + '</p>';
                    html += '<p class="' + statusClass + '">' + statusText + '</p>';
                    html += '</div>';
               }
               container.innerHTML = html;
          }

          // ===== بارگذاری صفحه =====
          window.onload = function() {
               renderStats(statsData);
               renderFeedback(feedbackData.details || []);
               if (window.componentHandler) {
                    window.componentHandler.upgradeAllRegistered();
               }
          };
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
