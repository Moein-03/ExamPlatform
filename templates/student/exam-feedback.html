<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>نتایج آزمون</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          body { direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; }
          .mdl-card { max-width: 800px; margin: 0 auto; width: 100%; }
          .score-number { font-size: 2.5em; color: #3f51b5; font-weight: bold; }
          .status-passed { color: #4caf50; font-size: 1.5em; font-weight: bold; }
          .status-failed { color: #f44336; font-size: 1.5em; font-weight: bold; }
          .stat-box { padding: 20px; text-align: center; background: #f9f9f9; border-radius: 8px; height: 100%; }
          .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #eee; }
          .info-label { width: 120px; font-weight: bold; color: #555; }
          .info-value { flex: 1; }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text">نتایج آزمون</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <div id="student-info"></div>
                         <div class="mdl-grid" id="stats-container"></div>
                         <div style="margin-top: 20px;">
                         <a href="{{ base_url }}/exams" class="mdl-button mdl-js-button mdl-button--raised" style="margin-top: 10px;">بازگشت به لیست</a>
                         </div>
                    </div>
               </div>
          </div>
     </div>

     <div id="exam-data" 
          data-feedback='{{ feedback_json }}' 
          data-stats='{{ stats_json }}'
          data-base-url='{{ base_url }}'>
     </div>

     <script>
          (function() {
               var dataElement = document.getElementById('exam-data');
               var feedback = JSON.parse(dataElement.getAttribute('data-feedback') || '{}');
               var stats = JSON.parse(dataElement.getAttribute('data-stats') || '{}');
               var baseUrl = dataElement.getAttribute('data-base-url') || '';

               function renderStudentInfo() {
                    var container = document.getElementById('student-info');
                    if (!container) return;
                    if (!feedback || !feedback.fullname) {
                         container.innerHTML = '<p style="color:#999;">اطلاعاتی یافت نشد.</p>';
                         return;
                    }
                    var html = '';
                    html += '<div class="info-row"><span class="info-label">نام:</span><span class="info-value">' + (feedback.fullname || '') + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">ایمیل:</span><span class="info-value">' + (feedback.email || '') + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">نمره:</span><span class="info-value"><span class="score-number">' + (feedback.score || 0) + '</span></span></div>';
                    html += '<div class="info-row"><span class="info-label">وضعیت:</span><span class="info-value"><span class="' + (feedback.passed ? 'status-passed' : 'status-failed') + '">' + (feedback.passed ? 'قبول' : 'مردود') + '</span></span></div>';
                    container.innerHTML = html;
               }

               function renderStats() {
                    var container = document.getElementById('stats-container');
                    if (!container) return;
                    var html = '';

                    html += '<div class="mdl-cell mdl-cell--4-col">';
                    html += '<div class="stat-box">';
                    html += '<h3>تعداد شرکت‌کنندگان</h3>';
                    html += '<p style="font-size:2em;">' + (stats.total_participants || 0) + '</p>';
                    html += '</div></div>';

                    html += '<div class="mdl-cell mdl-cell--4-col">';
                    html += '<div class="stat-box">';
                    html += '<h3>میانگین نمرات</h3>';
                    html += '<p style="font-size:2em;">' + (stats.avg_score || 0) + '</p>';
                    html += '</div></div>';

                    html += '<div class="mdl-cell mdl-cell--4-col">';
                    html += '<div class="stat-box">';
                    html += '<h3>بالاترین/پایین‌ترین</h3>';
                    html += '<p style="font-size:1.2em;">' + (stats.max_score || 0) + ' / ' + (stats.min_score || 0) + '</p>';
                    html += '</div></div>';

                    container.innerHTML = html;
               }

               window.onload = function() {
                    renderStudentInfo();
                    renderStats();
                    if (window.componentHandler) {
                         window.componentHandler.upgradeAllRegistered();
                    }
               };
          })();
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
