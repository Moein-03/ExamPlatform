<div id="register-page" style="max-width:400px; margin:0 auto; padding:20px;">
     <h3>ثبت نام</h3>
     <form method="POST" action="{{ base_url }}/register">
          <input name="fullname" placeholder="نام کامل" required>
          <input name="email" type="email" placeholder="ایمیل" required>
          <input name="password" type="password" placeholder="رمز عبور" required>
          <select name="role">
               <option value="student">دانشجو</option>
               <option value="teacher">استاد</option>
          </select>
          <input name="university_id" placeholder="شماره دانشجویی/پرسنلی (اختیاری)">
          <button type="submit">ثبت نام</button>
     </form>
     <p style="text-align:center;"><a href="#" data-link="{{ base_url }}/login">ورود</a></p>
</div>

<script>
     (function() {
          var base_url = window.__DATA__ && window.__DATA__.base_url ? window.__DATA__.base_url : '';

          var links = document.querySelectorAll('[data-link]');
          for (var i = 0; i < links.length; i++) {
               var link = links[i];
               var path = link.getAttribute('data-link');
               if (path) {
                    link.href = base_url + path;
               }
          }

          var form = document.getElementById('register-form');
          if (form) {
               form.action = '{{ base_url }}/register';
          }
     })();
</script>
