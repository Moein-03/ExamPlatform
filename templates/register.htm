<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ثبت نام | ورود</title>
     <link rel="stylesheet" href="./style.css">
</head>
<body>
     <div class="container">
          <div class="card">
               <div class="card-header">
                    <h1>ایجاد حساب کاربری</h1>
                    <p>نوع کاربری خود را انتخاب کنید: دانشجو یا استاد</p>
               </div>
               <form action="http://127.0.0.1:8000/ExamPlatform/" method="POST">
                    <div class="form-group">
                         <label><span class="required">*</span> نام و نام خانوادگی</label>
                         <input type="text" name="fullname" placeholder="مثال: معین خسروی" required>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> آدرس ایمیل</label>
                         <input type="email" name="email" placeholder="example@domain.com" required>
                    </div>
                    <div class="form-row">
                         <div class="form-group">
                         <label><span class="required">*</span> رمز عبور</label>
                         <input type="password" name="password" placeholder="حداقل ۶ کاراکتر" required>
                         </div>
                         <div class="form-group">
                         <label><span class="required">*</span> تکرار رمز عبور</label>
                         <input type="password" name="password_confirm" placeholder="دوباره وارد کنید" required>
                         </div>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> نقش کاربر</label>
                         <div class="radio-group">
                         <label class="radio-label">
                              <input type="radio" name="role" value="student" checked>دانشجو
                         </label>
                         <label class="radio-label">
                              <input type="radio" name="role" value="teacher">استاد
                         </label>
                         </div>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> شماره دانشجویی / کد پرسنلی استاد</label>
                         <input type="text" name="university_id" placeholder="شماره دانشجویی / کد پرسنلی خود را وارد کنید">
                    </div>
                    <button type="submit">ثبت نام و ورود به سامانه</button>
               </form>
               <div class="note">پس از ثبت نام، بر اساس نقش خود به امکانات متفاوتی دسترسی خواهید داشت.</div>
          </div>
     </div>
</body>
</html>
