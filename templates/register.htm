<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ثبت‌نام کاربر</title>
     <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>
<body>
     <div class="container">
          <div class="card">
               <div class="card-header">
                    <h1>ثبت‌ نام جدید</h1>
                    <p>اطلاعات خود را وارد کنید</p>
               </div>
               <form action="{{ base_path }}/register" method="POST">
                    <div class="form-group">
                         <label><span class="required">*</span> نام کامل</label>
                         <input type="text" name="fullname" placeholder="مثال: علی محمدی" required>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> ایمیل</label>
                         <input type="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                         <label><span class="required">*</span> رمز عبور</label>
                         <input type="password" name="password" placeholder="حداقل ۶ کاراکتر" required>
                    </div>
                    <div class="form-group">
                         <label>نقش</label>
                         <select name="role">
                         <option value="student">دانشجو</option>
                         <option value="teacher">استاد</option>
                         <option value="admin">مدیر</option>
                         </select>
                    </div>
                    <div class="form-group">
                         <label>شماره دانشجویی/پرسنلی</label>
                         <input type="text" name="university_id" placeholder="اختیاری">
                    </div>
                    <button type="submit">ثبت‌نام</button>
               </form>
               <div class="note">
                    <a href="{{ base_path }}/">بازگشت به صفحه اصلی</a>
               </div>
          </div>
     </div>
</body>
</html>
