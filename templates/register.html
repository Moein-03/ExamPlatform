<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ثبت نام</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     
     <style>
          body {
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
               min-height: 100vh;
               margin: 0;
               font-family: Tahoma, sans-serif;
          }
          .main-container {
               display: flex;
               align-items: center;
               justify-content: center;
               min-height: 100vh;
               padding: 20px;
          }
          .mdl-card {
               width: 100%;
               max-width: 460px;
               border-radius: 12px;
               overflow: hidden;
               box-shadow: 0 10px 30px rgba(0,0,0,0.2);
          }
          .card-header {
               background: #3f51b5;
               color: white;
               padding: 24px 24px;
               text-align: center;
          }
          .card-header h2 {
               margin: 8px 0 0 0;
               font-size: 1.7rem;
          }
          .form-content {
               padding: 24px 32px 32px;
          }
          .mdl-textfield {
               width: 100%;
               margin-bottom: 16px;
          }
          .mdl-button {
               width: 100%;
               height: 52px;
               font-size: 1.05rem;
               margin-top: 8px;
          }
     </style>
</head>
<body>
     <div class="main-container">
          <div class="mdl-card mdl-shadow--6dp">

               <div class="card-header">
                    <i class="material-icons" style="font-size: 42px;">person_add</i>
                    <h2>ثبت نام</h2>
               </div>

               <div class="form-content">
                    <form method="POST" action="{{ base_url }}/register" id="register-form">
                         
                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                         <input class="mdl-textfield__input" type="text" name="fullname" required>
                         <label class="mdl-textfield__label">نام کامل</label>
                         </div>

                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                         <input class="mdl-textfield__input" type="email" name="email" required>
                         <label class="mdl-textfield__label">ایمیل</label>
                         </div>

                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                         <input class="mdl-textfield__input" type="password" name="password" required>
                         <label class="mdl-textfield__label">رمز عبور</label>
                         </div>

                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                         <select class="mdl-textfield__input" name="role">
                              <option value="student">دانشجو</option>
                              <option value="teacher">استاد</option>
                         </select>
                         <label class="mdl-textfield__label">نقش</label>
                         </div>

                         <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                         <input class="mdl-textfield__input" type="text" name="university_id">
                         <label class="mdl-textfield__label">شماره دانشجویی / پرسنلی (اختیاری)</label>
                         </div>

                         <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">
                         ثبت نام
                         </button>
                    </form>

                    <p style="text-align: center; margin-top: 20px; margin-bottom: 0;">
                         <a href="#" data-link="{{ base_url }}/login" style="color: #3f51b5; text-decoration: none;">
                         قبلاً ثبت نام کرده‌اید؟ ورود
                         </a>
                    </p>
               </div>
          </div>
     </div>

     <script>
          (function() {
               var base_url = window.__DATA__ ? window.__DATA__.base_url : '';
               var links = document.querySelectorAll('[data-link]');
               links.forEach(link => {
                    var path = link.getAttribute('data-link');
                    if (path) link.href = base_url + path;
               });
          })();
     </script>

     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
