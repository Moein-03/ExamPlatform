<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>جزئیات آزمون</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; }
          .mdl-card { max-width: 800px; margin: 0 auto; width: 100%; }
          .mdl-card__supporting-text { width: 100%; box-sizing: border-box; }
          .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #eee; }
          .info-label { width: 120px; font-weight: bold; color: #555; }
          .info-value { flex: 1; }
          .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 0.9em; font-weight: 500; }
          .status-published { background: #e8f5e9; color: #2e7d32; }
          .status-draft { background: #fff3e0; color: #e65100; }
          .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
          .btn-group form { display: inline; }
          .question-list { margin-top: 16px; }
          .question-item { padding: 8px 12px; background: #f9f9f9; border-radius: 4px; margin-bottom: 4px; }
          .student-list { margin-top: 16px; }
          .student-item { padding: 4px 12px; background: #f9f9f9; border-radius: 4px; margin-bottom: 4px; }
          .empty-msg { color: #999; font-style: italic; }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text" id="exam-title">جزئیات آزمون</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <div id="exam-info"></div>

                         <div class="btn-group" id="action-buttons"></div>

                         <h4 style="margin-top: 20px;">سوالات این آزمون</h4>
                         <div id="questions-list" class="question-list"></div>

                         <h4 style="margin-top: 20px;">دانشجویان شرکت‌کننده</h4>
                         <div id="students-list" class="student-list"></div>

                         <div style="margin-top: 20px;">
                         <a href="{{ base_url }}/exams" class="mdl-button mdl-js-button mdl-button--raised">بازگشت به لیست</a>
                         </div>
                    </div>
               </div>
          </div>
     </div>

     <div id="exam-data" data-exam='{{ exam_json }}' data-base-url='{{ base_url }}'></div>

     <script>
          (function() {
               var dataElement = document.getElementById('exam-data');
               var exam = JSON.parse(dataElement.getAttribute('data-exam') || 'null');
               var baseUrl = dataElement.getAttribute('data-base-url') || '';

               if (!exam) {
                    document.getElementById('exam-title').textContent = 'آزمون یافت نشد';
                    return;
               }

               function renderExamInfo() {
                    var container = document.getElementById('exam-info');
                    var statusText = exam.is_published ? 'فعال' : 'پیش‌نویس';
                    var statusClass = exam.is_published ? 'status-published' : 'status-draft';
                    var teacherName = exam.teacher_name || 'نامشخص';

                    var html = '';
                    html += '<div class="info-row"><span class="info-label">عنوان:</span><span class="info-value">' + (exam.title || '') + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">استاد:</span><span class="info-value">' + teacherName + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">توضیحات:</span><span class="info-value">' + (exam.description || '') + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">زمان شروع:</span><span class="info-value">' + (exam.start_time || '') + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">مدت زمان:</span><span class="info-value">' + (exam.duration || 0) + ' دقیقه</span></div>';
                    html += '<div class="info-row"><span class="info-label">نمره کل:</span><span class="info-value">' + (exam.total_score || 0) + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">تعداد سوالات:</span><span class="info-value">' + (exam.total_questions || 0) + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">وضعیت:</span><span class="info-value"><span class="status-badge ' + statusClass + '">' + statusText + '</span></span></div>';
                    html += '<div class="info-row"><span class="info-label">انتخاب تصادفی:</span><span class="info-value">' + (exam.is_random ? 'بله' : 'خیر') + '</span></div>';

                    container.innerHTML = html;
                    document.getElementById('exam-title').textContent = 'جزئیات آزمون: ' + (exam.title || '');
               }

               function renderActions() {
                    var container = document.getElementById('action-buttons');
                    var html = '';

                    html += '<a href="' + baseUrl + '/exam/edit/' + exam.id + '" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">ویرایش</a>';

                    if (exam.is_published) {
                         html += '<form method="POST" action="' + baseUrl + '/exam/unpublish/' + exam.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از غیرفعال کردن این آزمون اطمینان دارید؟\');">';
                         html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--raised" style="background:#ff9800; color:white;">غیرفعال کردن</button>';
                         html += '</form>';
                    } else {
                         html += '<form method="POST" action="' + baseUrl + '/exam/publish/' + exam.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از فعال کردن این آزمون اطمینان دارید؟\');">';
                         html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--raised" style="background:#4caf50; color:white;">فعال کردن</button>';
                         html += '</form>';
                    }

                    html += '<form method="POST" action="' + baseUrl + '/exam/delete/' + exam.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از حذف این آزمون اطمینان دارید؟\');">';
                    html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--raised" style="background:#f44336; color:white;">حذف</button>';
                    html += '</form>';

                    container.innerHTML = html;
               }

               function renderQuestions() {
                    var container = document.getElementById('questions-list');
                    if (!exam.question_ids || exam.question_ids.length === 0) {
                         container.innerHTML = '<p class="empty-msg">هیچ سوالی برای این آزمون انتخاب نشده است.</p>';
                         return;
                    }
                    var html = '';
                    for (var i = 0; i < exam.question_ids.length; i++) {
                         html += '<div class="question-item">سوال ' + (i + 1) + ' (شناسه: ' + exam.question_ids[i] + ')</div>';
                    }
                    container.innerHTML = html;
               }

               function renderStudents() {
                    var container = document.getElementById('students-list');
                    if (!exam.student_ids || exam.student_ids.length === 0) {
                         container.innerHTML = '<p class="empty-msg">هیچ دانشجویی برای این آزمون ثبت‌نام نشده است.</p>';
                         return;
                    }
                    var html = '';
                    for (var i = 0; i < exam.student_ids.length; i++) {
                         html += '<div class="student-item">دانشجو (شناسه: ' + exam.student_ids[i] + ')</div>';
                    }
                    container.innerHTML = html;
               }

               window.onload = function() {
                    renderExamInfo();
                    renderActions();
                    renderQuestions();
                    renderStudents();
                    if (window.componentHandler) {
                         window.componentHandler.upgradeAllRegistered();
                    }
               };
          })();
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
