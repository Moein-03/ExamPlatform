<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>جزئیات آزمون</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
     <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { direction: rtl; text-align: right; font-family: 'Roboto', Tahoma, sans-serif; background: #f5f5f5; }
          .mdl-card { max-width: 800px; margin: 0 auto; width: 100%; }
          .mdl-card__supporting-text { width: 100%; box-sizing: border-box; }
          .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #eee; }
          .info-label { width: 120px; font-weight: bold; color: #555; }
          .info-value { flex: 1; }

          .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 0.9em; font-weight: 500; display: inline-block; }
          .status-draft { background: #fff3e0; color: #e65100; }
          .status-active { background: #e8f5e9; color: #2e7d32; }
          .status-ongoing { background: #fff9c4; color: #f57f17; }
          .status-ended { background: #fce4ec; color: #c62828; }
          .status-unknown { background: #e0e0e0; color: #616161; }

          .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
          .btn-group form { display: inline; }
          .empty-msg { color: #999; font-style: italic; }
          .btn-publish { background: #4caf50; color: white; }
          .btn-unpublish { background: #ff9800; color: white; }
          .btn-delete { background: #f44336; color: white; }
          .btn-take { background: #2196f3; color: white; }
          .btn-take-disabled { background: #e0e0e0; color: #9e9e9e; pointer-events: none; }
     </style>
</head>
<body>
     <div class="mdl-grid">
          <div class="mdl-cell mdl-cell--12-col">
               <div class="mdl-card mdl-shadow--2dp">
                    <div class="mdl-card__title">
                         <h2 class="mdl-card__title-text" id="exam-title">جزئیات آزمون</h2>
                    </div>
                    <div class="mdl-card__supporting-text">
                         <div id="exam-info"></div>

                         <div class="btn-group" id="action-buttons"></div>

                         <div style="margin-top: 20px;">
                         <a href="{{ base_url }}/exams" class="mdl-button mdl-js-button mdl-button--raised">بازگشت به لیست</a>
                         </div>
                    </div>
               </div>
          </div>
     </div>

     <div id="exam-data" data-exam='{{ exam_json }}' data-base-url='{{ base_url }}' data-user-role='{{ user_role }}'></div>

     <script>
          (function() {
               var dataElement = document.getElementById('exam-data');
               var exam = JSON.parse(dataElement.getAttribute('data-exam') || 'null');
               var baseUrl = dataElement.getAttribute('data-base-url') || '';
               var userRole = dataElement.getAttribute('data-user-role') || '';

               if (!exam) {
                    document.getElementById('exam-title').textContent = 'آزمون یافت نشد';
                    return;
               }

               function renderExamInfo() {
                    var container = document.getElementById('exam-info');
                    var statusText = exam.exam_status || 'نامشخص';
                    var statusClass = exam.status_class || 'status-unknown';
                    var teacherName = exam.teacher_name || 'نامشخص';

                    var html = '';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">عنوان:</span><span class="info-value">' + (exam.title || '') + '</span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">استاد:</span><span class="info-value">' + teacherName + '</span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">توضیحات:</span><span class="info-value">' + (exam.description || '') + '</span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">تاریخ و زمان برگزاری آزمون:</span><span class="info-value">' + ((exam.start_time || '—').replace('T', ' | ') || '')+ '</span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">مدت زمان:</span><span class="info-value">' + (exam.duration || 0) + ' دقیقه</span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">نمره کل:</span><span class="info-value">' + (exam.total_score || 0) + '</span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">تعداد سوالات:</span><span class="info-value">' + (exam.total_questions || 0) + '</span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">وضعیت:</span><span class="info-value"><span class="status-badge ' + statusClass + '">' + statusText + '</span></span></div>';
                    html += '<div class="info-row"><span class="info-label" style="width: 25%;">انتخاب تصادفی:</span><span class="info-value">' + (exam.is_random ? 'بله' : 'خیر') + '</span></div>';

                    container.innerHTML = html;
                    document.getElementById('exam-title').textContent = 'جزئیات آزمون: ' + (exam.title || '');
               }

               function renderActions() {
                    var container = document.getElementById('action-buttons');
                    var html = '';

                    if (userRole === 'admin' || userRole === 'teacher') {
                         html += '<a href="' + baseUrl + '/exam/edit/' + exam.id + '" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">ویرایش</a>';

                         if (exam.exam_status === 'پیش‌نویس') {
                              html += '<form method="POST" action="' + baseUrl + '/exam/publish/' + exam.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از فعال کردن این آزمون اطمینان دارید؟\');">';
                              html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--raised btn-publish">فعال کردن</button>';
                              html += '</form>';
                         } else if (exam.exam_status === 'فعال' || exam.exam_status === 'در حال برگزاری') {
                              html += '<form method="POST" action="' + baseUrl + '/exam/unpublish/' + exam.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از غیرفعال کردن این آزمون اطمینان دارید؟\');">';
                              html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--raised btn-unpublish">غیرفعال کردن</button>';
                              html += '</form>';
                         }

                         html += '<form method="POST" action="' + baseUrl + '/exam/delete/' + exam.id + '" style="display:inline;" onsubmit="return confirm(\'آیا از حذف این آزمون اطمینان دارید؟\');">';
                         html += '<button type="submit" class="mdl-button mdl-js-button mdl-button--raised btn-delete">حذف</button>';
                         html += '</form>';
                    } else if (userRole === 'student') {
                         if (exam.exam_status === 'در حال برگزاری') {
                              html += '<a href="' + baseUrl + '/exam/take/' + exam.id + '" class="mdl-button mdl-js-button mdl-button--raised btn-take">شرکت در آزمون</a>';
                         } else if (exam.exam_status === 'فعال') {
                              html += '<button class="mdl-button mdl-js-button mdl-button--raised btn-take-disabled" disabled>عیرفعال تا شروع آزمون</button>';
                         } else {
                              html += '';
                         }
                    }

                    container.innerHTML = html;
               }

               window.onload = function() {
                    renderExamInfo();
                    renderActions();
                    if (window.componentHandler) {
                         window.componentHandler.upgradeAllRegistered();
                    }
               };
          })();
     </script>
     <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
</body>
</html>
